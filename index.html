<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zeion Hub - Get Key</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:400px;
    background:#161b22;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,119,255,.4);
}

.title{
    font-size:32px;
    font-weight:bold;
    background:linear-gradient(90deg,#00bfff,#0066ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.info{
    margin:15px 0;
    color:#8b949e;
}

.key{
    background:#0d1117;
    border:1px solid #0066ff;
    padding:15px;
    border-radius:10px;
    word-break:break-all;
    margin-bottom:15px;
    font-family: monospace;
    font-size: 18px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:16px;
    font-weight:bold;
    background:linear-gradient(90deg,#00bfff,#0066ff);
    margin-bottom: 10px;
}

button:disabled{
    opacity:.5;
    cursor: not-allowed;
}

.btn-copy {
    background: linear-gradient(90deg, #4caf50, #2e7d32);
    display: none;
}
</style>
</head>
<body>

<div class="box">
    <div class="title">ZEION HUB</div>

    <div class="info" id="status">
        Click Start and wait 20 seconds to get key
    </div>

    <div class="key" id="keyBox">
        No Key
    </div>

    <button id="btn" onclick="startTimer()">
        Start
    </button>
    
    <button id="copyBtn" class="btn-copy" onclick="copyKey()">
        📋 Copy Key
    </button>
</div>

<script>
let timeLeft = 20; // กำหนดเวลานับถอยหลัง 20 วินาที
let generatedKey = "";
let timerInterval = null;

function generateKey(length=32){
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"; 
    let result = "";
    for(let i=0;i<length;i++){
        result += chars[Math.floor(Math.random()*chars.length)];
    }
    return result;
}

function startTimer(){
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");
    
    btn.disabled = true;
    status.innerText = "Please wait " + timeLeft + " seconds...";

    // เริ่มระบบนับถอยหลังทีละ 1 วินาที
    timerInterval = setInterval(() => {
        timeLeft--;
        
        if (timeLeft > 0) {
            status.innerText = "Please wait " + timeLeft + " seconds...";
            btn.innerText = "Processing (" + timeLeft + "s)";
        } else {
            // เมื่อเวลาหมด (ครบ 20 วิ)
            clearInterval(timerInterval);
            
            generatedKey = generateKey();

            document.getElementById("keyBox").innerText = generatedKey;
            status.innerText = "Key generated successfully! Copy and redeem in Discord.";
            
            btn.innerText = "Done!";
            btn.disabled = true;

            // แสดงปุ่ม Copy Key
            document.getElementById("copyBtn").style.display = "block";
        }
    }, 1000);
}

function copyKey() {
    if(!generatedKey) return;
    
    const copyBtn = document.getElementById("copyBtn");

    // แผนที่ 1: คัดลอกแบบใหม่
    navigator.clipboard.writeText(generatedKey).then(() => {
        copyBtn.innerText = "✅ Copied!";
        setTimeout(() => { copyBtn.innerText = "📋 Copy Key"; }, 2000);
    }).catch(err => {
        // แผนที่ 2: คัดลอกแบบเก่า (Fallback ป้องกันข้อความแจ้งเตือนเด้งหลุด)
        try {
            const textArea = document.createElement("textarea");
            textArea.value = generatedKey;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            const successful = document.execCommand('copy');
            document.body.removeChild(textArea);

            if (successful) {
                copyBtn.innerText = "✅ Copied!";
            } else {
                copyBtn.innerText = "❌ Copy Failed";
            }
        } catch (fallbackErr) {
            copyBtn.innerText = "❌ Not Allowed";
        }

        setTimeout(() => { copyBtn.innerText = "📋 Copy Key"; }, 2000);
    });
}
</script>

</body>
</html>
